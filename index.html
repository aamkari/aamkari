<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AAMKARI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#F7F4EF;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

font-family:'Cormorant Garamond',serif;

overflow:hidden;

}

.container{

width:90%;

max-width:900px;

text-align:center;

}

.logo{

font-size:clamp(65px,14vw,110px);

letter-spacing:12px;

font-weight:500;

color:#1A1A1A;

margin-bottom:40px;

line-height:1;

}

.tagline{

font-size:clamp(22px,5vw,34px);

line-height:1.7;

color:#5E564F;

max-width:700px;

margin:auto;

margin-bottom:70px;

}

.line{

width:110px;

height:1px;

background:#B59662;

margin:auto;

margin-bottom:55px;

}

.launch{

font-size:clamp(16px,4vw,22px);

letter-spacing:8px;

text-transform:uppercase;

color:#A78349;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">
AAMKARI
</div>

<div class="tagline">
Where Timeless Indian Craftsmanship Meets the World
</div>

<div class="line"></div>

<div class="launch">
Launching Soon
</div>

</div>

</body>

</html>
